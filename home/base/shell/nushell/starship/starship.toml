[julia]
symbol = " "

[kubernetes]
# デフォルトは無効。k8s 関連ディレクトリにいるときだけ context を表示する。
disabled = false
detect_files = []
detect_folders = ['k8s', 'kubernetes', 'helm', 'manifests', 'kustomize']

