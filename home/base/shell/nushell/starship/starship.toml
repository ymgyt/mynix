# https://starship.rs/config/#prompt

add_newline = true
format = '''
[┌─](bold green)$all[└─](bold green)$character
'''

[profiles]
transient = "$character"

[character] # The name of the module we are configuring is 'character'
error_symbol = '[✗](bold red) '
format = "$symbol"
success_symbol = '[❯](bold green) '
[aws]
symbol = "  "

[buf]
symbol = " "

[c]
symbol = " "

[conda]
symbol = " "

[dart]
symbol = " "

[directory]
read_only = " "

[docker_context]
symbol = " "

[elixir]
symbol = " "

[elm]
symbol = " "

[fossil_branch]
symbol = " "

[gcloud]
# project が設定されているときだけ ☁️ + project を表示する。
# $symbol は常に非空なので format に入れると雲が常時表示されてしまう。
# 代わりに雲をリテラルで埋め込み、$project が空ならグループ () ごと非表示にする。
format = '[(on ☁️ $project )]($style)'

[git_branch]
symbol = " "

[golang]
symbol = " "

[guix_shell]
symbol = " "

[haskell]
symbol = " "

[haxe]
